# ==============================
# Application Configuration
# ==============================
spring.application.name=taskmanager

# Active profile: use 'dev' locally, Railway sets 'prod' via DATABASE_URL
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:MyVerySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong123456789}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Server port (Railway provides PORT env var)
server.port=${PORT:8080}
